name: camera_app
description: "A new Flutter project."
publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.11.2
  permission_handler: ^12.0.3
  provider: ^6.1.5+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  easy_localization: ^3.0.8
  hive_generator: ^2.0.1
  build_runner: ^2.4.15
  #Google ML Kit paketleri
  google_mlkit_face_detection: ^0.13.1
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_pose_detection: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

